<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Parabéns!</title>

<style>

body{
margin:0;
font-family: Arial, Helvetica, sans-serif;
background:#f5f7f6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:50px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.08);
text-align:center;
max-width:500px;
}

.check{
width:70px;
height:70px;
background:#e6f4ef;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
margin:0 auto 25px auto;
font-size:30px;
color:#2fbf8f;
}

h1{
margin-bottom:10px;
font-size:28px;
}

.sub{
font-size:18px;
margin-bottom:25px;
}

p{
color:#555;
line-height:1.6;
}

.highlight{
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<div class="check">✔</div>

<h1>Parabéns pela decisão!</h1>

<p class="sub">
Você acabou de dar <span class="highlight">um passo importante para atrair mais clientes.</span>
</p>

<p>
Recebemos suas informações e um especialista vai analisar rapidamente o seu negócio.
</p>

<p>
Dentro das próximas horas entraremos em contato pelo <span class="highlight">WhatsApp ou email</span>.
</p>

<p style="margin-top:25px;color:#888;">
Sua solicitação já está em análise.
</p>

</div>

</body>
</html>
